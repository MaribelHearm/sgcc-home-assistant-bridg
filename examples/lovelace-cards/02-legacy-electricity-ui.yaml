# SGCC Home Assistant Bridge - 消逝的电力 UI 风格卡片
# 需要 HACS: apexcharts-card、card-mod。
# 把 4840 替换成自己的户号后四位。

title: 电力卡片
path: sgcc-legacy-ui
icon: mdi:flash
type: sections
max_columns: 2
background: '#101010'
sections:
  - type: grid
    cards:
      - type: markdown
        content: |
          {% set h='sensor.guo_wang_dian_fei_4840_li_shi_shu_ju_4840' %}
          {% set d=state_attr(h,'latest_daily_date') or '' %}
          {% set rows=state_attr(h,'daily') or [] %}
          {% set monthly=state_attr(h,'monthly') or [] %}
          {% set ns = namespace(latest={}) %}
          {%- for row in rows %}
          {%- if row.date == d %}{% set ns.latest = row %}{% endif %}
          {%- endfor %}
          {% set month_usage=states('sensor.guo_wang_dian_fei_4840_yue_du_yong_dian_4840')|float(0)|round(2) %}
          {% set month_charge=states('sensor.guo_wang_dian_fei_4840_yue_du_dian_fei_4840')|float(0)|round(2) %}
          {% set last_month=monthly[1] if monthly|length > 1 else {} %}
          <h1>⚡　国网电费</h1>
          <p>{{ d }}</p>
          <table>
            <tbody>
              <tr><td><b>{{ states('sensor.guo_wang_dian_fei_4840_zui_jin_ri_yong_dian_4840')|float(0)|round(2) }}</b><br>当日用电 | kWh</td><td>峰：{{ ns.latest.peak_kwh|default(0)|round(2) }} kWh<br>谷：{{ ns.latest.valley_kwh|default(0)|round(2) }} kWh</td></tr>
              <tr><td><b>{{ month_charge }}</b><br>当期电费 | 元</td><td><b>{{ month_usage }}</b><br>当期电量 | kWh</td></tr>
              <tr><td><b>{{ last_month.charge_cny|default(0)|round(2) }}</b><br>上月电费 | 元</td><td><b>{{ last_month.usage_kwh|default(0)|round(2) }}</b><br>上月电量 | kWh</td></tr>
              <tr><td><b>{{ states('sensor.guo_wang_dian_fei_4840_nian_du_dian_fei_4840')|float(0)|round(2) }}</b><br>本年电费 | 元</td><td><b>{{ states('sensor.guo_wang_dian_fei_4840_nian_du_yong_dian_4840')|float(0)|round(2) }}</b><br>本年电量 | kWh</td></tr>
            </tbody>
          </table>
        card_mod:
          style:
            .: |
              ha-card { background:#2b2b2b; color:#fff; border-radius:12px; padding:18px 24px; }
              ha-markdown { padding:0 !important; }
            ha-markdown:
              $: |
                h1 { margin:0 0 2px; font-size:18px; color:#fff; }
                p { margin:0 0 16px; color:#fff; }
                table { width:100%; border-collapse:collapse; table-layout:fixed; }
                td { padding:8px 8px 14px 0; color:#fff; vertical-align:top; border:0; font-size:18px; line-height:1.35; }
                td:nth-child(2) { padding-left:18px; }
                b { font-size:28px; line-height:1.1; color:#fff; }


      - type: custom:apexcharts-card
        header:
          show: true
          title: 日用电量
        graph_span: 31d
        span:
          end: day
        apex_config:
          chart:
            height: 255
            background: transparent
            toolbar:
              show: false
          theme:
            mode: dark
          stroke:
            width: [0, 3]
            curve: smooth
          plotOptions:
            bar:
              columnWidth: 55%
          legend:
            show: true
          yaxis:
            decimalsInFloat: 1
        series:
          - entity: sensor.guo_wang_dian_fei_4840_li_shi_shu_ju_4840
            name: 日用电量
            type: column
            unit: kWh
            color: '#16c1b3'
            data_generator: |
              const rows = entity.attributes.daily || [];
              return rows
                .filter((row) => row.date && row.usage_kwh !== undefined)
                .map((row) => [new Date(row.date).getTime(), Number(row.usage_kwh)])
                .sort((a, b) => a[0] - b[0]);
          - entity: sensor.guo_wang_dian_fei_4840_li_shi_shu_ju_4840
            name: 电费
            type: line
            unit: 元
            color: '#7c4dff'
            data_generator: |
              const monthly = entity.attributes.monthly || [];
              const price = monthly.reduce((acc, row) => acc || (Number(row.usage_kwh) > 0 ? Number(row.charge_cny) / Number(row.usage_kwh) : 0), 0) || 0;
              const rows = entity.attributes.daily || [];
              return rows
                .filter((row) => row.date && row.usage_kwh !== undefined)
                .map((row) => [new Date(row.date).getTime(), Number(row.usage_kwh) * price])
                .sort((a, b) => a[0] - b[0]);
        card_mod:
          style: |
            ha-card { background:#2b2b2b; color:#fff; border-radius:12px; }

  - type: grid
    cards:
      - type: custom:apexcharts-card
        header:
          show: true
          title: 月用电量
        graph_span: 365d
        span:
          end: month
        apex_config:
          chart:
            height: 300
            background: transparent
            toolbar:
              show: false
          theme:
            mode: dark
          stroke:
            width: [0, 0, 3, 3]
          plotOptions:
            bar:
              columnWidth: 42%
          legend:
            show: true
          yaxis:
            decimalsInFloat: 0
        series:
          - entity: sensor.guo_wang_dian_fei_4840_li_shi_shu_ju_4840
            name: 月用电
            type: column
            unit: kWh
            color: '#12b5cb'
            data_generator: |
              const rows = entity.attributes.monthly || [];
              return rows.filter((row) => row.month).map((row) => [new Date(`${row.month}-01`).getTime(), Number(row.usage_kwh || 0)]).sort((a, b) => a[0] - b[0]);
          - entity: sensor.guo_wang_dian_fei_4840_li_shi_shu_ju_4840
            name: 月电费
            type: line
            unit: 元
            color: '#7c4dff'
            data_generator: |
              const rows = entity.attributes.monthly || [];
              return rows.filter((row) => row.month).map((row) => [new Date(`${row.month}-01`).getTime(), Number(row.charge_cny || 0)]).sort((a, b) => a[0] - b[0]);
        card_mod:
          style: |
            ha-card { background:#2b2b2b; color:#fff; border-radius:12px; }

      - type: markdown
        content: |
          {% set h='sensor.guo_wang_dian_fei_4840_li_shi_shu_ju_4840' %}
          {% set latest=state_attr(h,'latest_daily_date') or '' %}
          {% set rows=state_attr(h,'daily') or [] %}
          {% set month_prefix=latest[:7] %}
          {% set month_usage=states('sensor.guo_wang_dian_fei_4840_yue_du_yong_dian_4840')|float(0)|round(2) %}
          {% set month_charge=states('sensor.guo_wang_dian_fei_4840_yue_du_dian_fei_4840')|float(0)|round(2) %}
          {% set days = 31 %}
          <h2>{{ latest[:4] }}年 {{ latest[5:7]|int }}月</h2>
          <table>
            <thead>
              <tr><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th><th>日</th></tr>
            </thead>
            <tbody>
          {%- for week in range(0, 5) %}
              <tr>
          {%- for col in range(1, 8) %}
          {%- set day = week * 7 + col %}
          {%- set key = month_prefix ~ '-%02d'|format(day) %}
          {%- set ns = namespace(usage='') %}
          {%- for row in rows %}
          {%- if row.date == key %}{% set ns.usage = row.usage_kwh %}{% endif %}
          {%- endfor %}
                <td><b>{{ day if day <= days else '' }}</b>{% if ns.usage != '' %}<br><span>{{ ns.usage }}</span><br><em>{{ (ns.usage|float(0) * (month_charge / month_usage if month_usage else 0))|round(2) }}元</em>{% endif %}</td>
          {%- endfor %}
              </tr>
          {%- endfor %}
            </tbody>
          </table>
          <p>月电量: <b>{{ month_usage }}</b>度　月电费: <b>{{ month_charge }}</b>元</p>
        card_mod:
          style:
            .: |
              ha-card { background:#2b2b2b; color:#fff; border-radius:12px; padding:14px 16px; }
              ha-markdown { padding:0 !important; }
            ha-markdown:
              $: |
                h2 { text-align:center; font-size:20px; margin:0 0 12px; color:#fff; }
                table { width:100%; border-collapse:collapse; table-layout:fixed; }
                th { color:#fff; font-size:18px; padding:7px 0 9px; border-bottom:1px solid rgba(0,210,220,.55); }
                td { height:54px; padding:4px 3px; text-align:center; vertical-align:top; border:1px solid rgba(0,210,220,.45); background:#333; color:#fff; }
                td b { display:block; font-size:16px; line-height:18px; color:#fff; }
                td span { color:#00e5e5; font-size:15px; line-height:16px; font-weight:800; }
                td em { color:#7c4dff; font-size:15px; line-height:16px; font-style:normal; font-weight:800; }
                p { text-align:right; margin:10px 0 0; color:#00e5e5; font-weight:800; }
                p b:last-child { color:#7c4dff; }
