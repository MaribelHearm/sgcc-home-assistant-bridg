# SGCC Home Assistant Bridge - 原始版 Lovelace 卡片
# 把 4840 替换成自己的户号后四位。

title: 国网电费
path: sgcc-original
icon: mdi:transmission-tower
type: sections
max_columns: 2
sections:
  - type: grid
    cards:
      - type: grid
        title: 国网电费
        columns: 2
        square: false
        cards:
          - type: tile
            entity: sensor.guo_wang_dian_fei_4840_dian_fei_yu_e_4840
            name: 电费余额
            icon: mdi:wallet
          - type: tile
            entity: sensor.guo_wang_dian_fei_4840_ying_jiao_jin_e_4840
            name: 应交金额
            icon: mdi:cash-clock
          - type: tile
            entity: sensor.guo_wang_dian_fei_4840_zui_jin_ri_yong_dian_4840
            name: 日用电量
            icon: mdi:lightning-bolt
          - type: tile
            entity: sensor.guo_wang_dian_fei_4840_yue_du_yong_dian_4840
            name: 月用电量
            icon: mdi:calendar-month
          - type: tile
            entity: sensor.guo_wang_dian_fei_4840_yue_du_dian_fei_4840
            name: 月电费
            icon: mdi:cash-multiple
          - type: tile
            entity: sensor.guo_wang_dian_fei_4840_nian_du_yong_dian_4840
            name: 年用电量
            icon: mdi:chart-timeline-variant

      - type: entities
        title: 数据
        show_header_toggle: false
        entities:
          - entity: sensor.guo_wang_dian_fei_4840_li_shi_shu_ju_4840
            name: 历史数据
          - entity: sensor.guo_wang_dian_fei_4840_zui_jin_ri_yong_dian_4840
            name: 日用电量
          - entity: sensor.guo_wang_dian_fei_4840_yue_du_yong_dian_4840
            name: 月用电量
          - entity: sensor.guo_wang_dian_fei_4840_yue_du_dian_fei_4840
            name: 月电费

  - type: grid
    cards:
      - type: markdown
        content: |
          {% set rows=state_attr('sensor.guo_wang_dian_fei_4840_li_shi_shu_ju_4840','daily') or [] %}
          {% set latest=state_attr('sensor.guo_wang_dian_fei_4840_li_shi_shu_ju_4840','latest_daily_date') or '' %}
          {% set month=latest[:7] %}
          {% set ns=namespace(tip=0, peak=0, flat=0, valley=0) %}
          {% for row in rows %}
          {% if row.date[:7] == month %}
          {% set ns.tip = ns.tip + (row.tip_kwh|default(0)|float(0)) %}
          {% set ns.peak = ns.peak + (row.peak_kwh|default(0)|float(0)) %}
          {% set ns.flat = ns.flat + (row.flat_kwh|default(0)|float(0)) %}
          {% set ns.valley = ns.valley + (row.valley_kwh|default(0)|float(0)) %}
          {% endif %}
          {% endfor %}
          ## 尖峰平谷
          - 尖：{{ ns.tip|round(2) }} kWh
          - 峰：{{ ns.peak|round(2) }} kWh
          - 平：{{ ns.flat|round(2) }} kWh
          - 谷：{{ ns.valley|round(2) }} kWh

      - type: history-graph
        title: 最近变化
        hours_to_show: 168
        entities:
          - entity: sensor.guo_wang_dian_fei_4840_zui_jin_ri_yong_dian_4840
            name: 日用电量
          - entity: sensor.guo_wang_dian_fei_4840_yue_du_yong_dian_4840
            name: 月用电量
